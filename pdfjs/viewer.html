<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Lecteur PDF (PDF.js)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        #pdf-viewer {
            min-height: 80vh;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <a href="../courses.html" class="btn btn-secondary mb-4">&larr; Retour aux formations</a>
        <div class="mb-3">
            <input type="text" id="pdfFile" class="form-control" placeholder="Nom du PDF (ex: uploads/MonFichier.pdf)">
            <button class="btn btn-primary mt-2" onclick="loadPDF()">Afficher PDF</button>
        </div>
        <div id="pdf-viewer" class="bg-white shadow rounded p-3"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js"></script>
    <script>
        function loadPDF() {
            const file = document.getElementById('pdfFile').value.trim();
            const container = document.getElementById('pdf-viewer');
            if (!file) {
                container.innerHTML = '<div class="alert alert-danger">Veuillez entrer le chemin du PDF.</div>';
                return;
            }
            container.innerHTML = '';
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js';
            pdfjsLib.getDocument(file).promise.then(function (pdf) {
                container.innerHTML = '';
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    pdf.getPage(pageNum).then(function (page) {
                        const scale = 1.2;
                        const viewport = page.getViewport({ scale: scale });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        container.appendChild(canvas);
                        const context = canvas.getContext('2d');
                        page.render({ canvasContext: context, viewport: viewport });
                    });
                }
            }, function (error) {
                container.innerHTML = '<div class="alert alert-danger">Impossible d\'afficher le document PDF.<br><small>' + error.message + '</small></div>';
            });
        }
    </script>
</body>

</html>
