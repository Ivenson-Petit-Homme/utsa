<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Lecture PDF - UTSA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        #pdf-viewer {
            min-height: 80vh;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <a href="../courses.html" class="btn btn-secondary mb-4">&larr; Retour aux formations</a>
        <div id="pdf-viewer" class="bg-white shadow rounded p-3"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js"></script>
    <script>
        // Récupère le paramètre 'file' dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');
        const container = document.getElementById('pdf-viewer');
        function showError(msg, detail) {
            container.innerHTML = `<div class='alert alert-danger'>${msg}${detail ? '<br><small>' + detail + '</small>' : ''}</div>`;
        }
        if (!file) {
            showError('Aucun document sélectionné.');
        } else {
            const url = '../uploads/' + file;
            container.innerHTML = '';
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js';
            pdfjsLib.getDocument(url).promise.then(function (pdf) {
                container.innerHTML = '';
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    pdf.getPage(pageNum).then(function (page) {
                        const scale = 1.2;
                        const viewport = page.getViewport({ scale: scale });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        container.appendChild(canvas);
                        const context = canvas.getContext('2d');
                        page.render({ canvasContext: context, viewport: viewport });
                    }, function (err) {
                        showError("Erreur lors de l'affichage d'une page du PDF.", err.message);
                    });
                }
            }, function (error) {
                showError("Impossible d'afficher le document PDF.", error.message);
            });
        }
    </script>
</body>

</html>
