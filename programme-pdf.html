<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Programme PDF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        .pdf-container {
            min-height: 80vh;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <a href="courses.html" class="btn btn-secondary mb-4">&larr; Retour aux formations</a>
        <div class="pdf-container bg-white shadow rounded p-3">
            <iframe id="pdfFrame" src="" width="100%" height="700px" style="border:none;"></iframe>
        </div>
    </div>
    <script>
        // Récupère le paramètre 'file' dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');
        if (file) {
            document.getElementById('pdfFrame').src = 'uploads/' + decodeURIComponent(file);
        } else {
            document.getElementById('pdfFrame').outerHTML = '<div class="alert alert-danger">Aucun document sélectionné.</div>';
        }
    </script>
</body>

</html>
