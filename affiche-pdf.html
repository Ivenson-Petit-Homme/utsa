<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Lecture PDF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        .pdf-container {
            min-height: 80vh;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <a href="courses.html" class="btn btn-secondary mb-4">&larr; Retour aux formations</a>
        <div class="pdf-container bg-white shadow rounded p-3 position-relative" style="overflow:hidden;">
            <div id="mask-header"
                style="position:absolute;top:0;left:0;width:100%;height:48px;z-index:2;background:#fff;opacity:0.98;">
            </div>
            <div id="mask-header2"
                style="position:absolute;top:96px;left:0;width:100%;height:64px;z-index:2;background:#fff;opacity:0.98;">
            </div>
            <div id="mask-header1"
                style="position:absolute;top:0;left:0;width:100%;height:120px;z-index:2;background:#fff;opacity:0.98;">
            </div>
            <iframe id="pdfFrame" src="" width="100%" height="700px"
                style="border:none;position:relative;z-index:1;"></iframe>
        </div>
    </div>
    <script>
        // Récupère le paramètre 'file' dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');
        if (file) {
            document.getElementById('pdfFrame').src = 'uploads/' + file;
        } else {
            document.getElementById('pdfFrame').outerHTML = '<div class="alert alert-danger">Aucun document sélectionné.</div>';
        }
    </script>
</body>

</html>
